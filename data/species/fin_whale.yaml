# Fin Whale (Balaenoptera physalus) - Species Configuration
# ==========================================================
# Parameters based on peer-reviewed literature. See docs/fin_whale_references.md
# for full citations and verification.

species: fin_whale
common_name: Fin Whale
scientific_name: Balaenoptera physalus

# Morphometrics
body_mass_kg: 70000             # Adult mass ~70 t (Lockyer 1976; Vikingsson et al. 2009)

# -----------------------------------------------------------------------------
# Physiology
# -----------------------------------------------------------------------------
# Core temperature: 36.1C measured in fin whale postmortem (Brodie & Paasche 1985)
# General baleen whale range: 36.6-37.2C (Kanwisher & Sundnes 1966)
core_temperature_C: 36.1        # Measured postmortem (Brodie & Paasche 1985)
core_temperature_min_C: 28.0    # Lethal-hypothermia GUARD (comparative mammalian cardiac limit ~28 C; no measured cetacean value). See docs/lethal_hypothermia_threshold.md
core_temperature_max_C: 40.0    # Lethal-hyperthermia GUARD (mammalian lethal ~42 C); not a normal-range bound.

# Fin whales are migratory, encountering polar to subtropical waters
# Thermoneutral zone similar to blue whales due to large size
thermoneutral_water_C: 8.0

# -----------------------------------------------------------------------------
# Scaling factors
# -----------------------------------------------------------------------------
# Large rorqual FMRs are less than half predicted from smaller mammals
# (Blawas et al. 2025, Science Advances)
# See docs/metabolic_derivation.md for allometric context
metabolic_scale: 0.004          # DEPRECATED (A4/D3): no longer drives Q_m (now FMR-forward from fmr_watts); kept for diagnostic. See docs/metabolic_derivation.md
fmr_watts: 7295                 # FMR estimate: ~50% Kleiber BMR for large rorquals (Blawas et al. 2025, Science Advances)
fmr_source: "Blawas et al. 2025 Science Advances; ~50% of Kleiber at 70 t"
perfusion_scale: 0.012          # BLUBBER-side CCHE reduction only (D1/A12): blubber omega_eff = 0.08*0.012 = 9.6e-4 kg/(m3-s).
                                # Core retains FULL arterial perfusion (omega_b=0.8), matching the manuscript.
                                # (Previously mis-scaled the core to 0.0096; baseline magnitude under A2 review, task #16.)
transition_fraction: 0.15
region_blend_iterations: 150
region_blend_alpha: 0.5

# -----------------------------------------------------------------------------
# Transient solver defaults
# -----------------------------------------------------------------------------
# Thermal material properties are in data/fin_whale/materials.json
# Blubber k=0.22 W/m-K based on Parry (1949) measurement on fin/blue whales
dt_seconds: 300
total_hours: 96
min_hours: 48
steady_eps: 1.0e-5

# -----------------------------------------------------------------------------
# Mesh paths (relative to project root)
# -----------------------------------------------------------------------------
mesh:
  surface_obj: assets/meshes/fin_whale_surface.obj
  volume_mesh: assets/meshes/fin_whale_variable_blubber.vtu
  volume_raw: assets/meshes/fin_whale_volume_full_gmsh.vtk
  element_size: 0.07            # UNIFORM physical element size across all species (run with --uniform-edge);
                               # surface resampled to ~0.07 m edges so node/tet count scales with body volume -> comparable meshes.

# -----------------------------------------------------------------------------
# Data paths (relative to project root)
# -----------------------------------------------------------------------------
data:
  vertex_groups: data/fin_whale/vertex_groups.json
  surface_mesh: data/fin_whale/surface_mesh.json
  surface_regions: data/fin_whale/surface_regions.json
  tissue_info: data/fin_whale/tissue_info_variable.json

# -----------------------------------------------------------------------------
# Regional blubber thickness (meters)
# -----------------------------------------------------------------------------
# Fin whale blubber: adult lateral mid-body 5.0-15.0 cm (Lockyer 1987, Sitkawhalefest).
# Prior value of 20 cm corresponds to the pregnant female maximum (Lockyer et al. 1985),
# not a representative adult mean. Updated to 10.0 cm (midpoint of adult lateral range).
# All other regions scaled proportionally (factor 10/20 = 0.50).
blubber_thickness:
  Body: 0.1000            # 10 cm - adult lateral mid-body mean (Lockyer 1987: 5-15 cm range)
  Peduncle: 0.0778        # scaled from Body (ratio ~0.778)
  Rostrum: 0.0445         # scaled from Body (ratio ~0.444)
  LeftPectoralFlipper: 0.0222   # scaled from Body (ratio ~0.222)
  RightPectoralFlipper: 0.0222  # scaled from Body (ratio ~0.222)
  Fluke: 0.0278           # scaled from Body (ratio ~0.278)
  DorsalFin: 0.0200       # scaled from Body (ratio ~0.200)
  VentralGrooves: 0.0222  # scaled from Body (ratio ~0.222)

# -----------------------------------------------------------------------------
# Baseline convection coefficients (W/m^2-K)
# -----------------------------------------------------------------------------
# Appendages function as thermal windows with high heat flux
# (Scholander & Schevill 1955; Kvadsheim & Folkow 1997)
# Similar to blue whale, adjusted for slightly thicker insulation
# Effective surface conductance (#19/A5): physical water-side values; insulation
# in blubber + rete/shell counter-current terms, not a fake low h.
convection_base:
  Body: 35.0
  Peduncle: 40.0
  Rostrum: 50.0
  DorsalFin: 55.0
  VentralGrooves: 45.0
  Fluke: 60.0
  LeftPectoralFlipper: 60.0
  RightPectoralFlipper: 60.0

# -----------------------------------------------------------------------------
# Thermoregulatory regions
# -----------------------------------------------------------------------------
# Regions with active vascular control via rete mirabile and AVAs
# (Scholander & Schevill 1955). Body included for global perfusion scaling.
thermoregulatory_regions:
  - Body
  - LeftPectoralFlipper
  - RightPectoralFlipper
  - Fluke
  - DorsalFin
  - VentralGrooves
  - Rostrum

# -----------------------------------------------------------------------------
# Thermoregulation capacity
# -----------------------------------------------------------------------------
# 10-fold modulation possible through vascular control (Kvadsheim & Folkow 1997)
convection_capacity:
  LeftPectoralFlipper: { min: 0.3, max: 3.0 }
  RightPectoralFlipper: { min: 0.3, max: 3.0 }
  Fluke: { min: 0.3, max: 3.0 }
  VentralGrooves: { min: 0.5, max: 2.0 }
  DorsalFin: { min: 0.7, max: 1.5 }
  Rostrum: { min: 0.7, max: 1.5 }

# -----------------------------------------------------------------------------
# Perfusion modulation capacity
# -----------------------------------------------------------------------------
# Blood flow control for heat retention/dissipation
perfusion_capacity:
  Body: { min: 0.7, max: 1.3 }
  LeftPectoralFlipper: { min: 0.05, max: 3.0 }
  RightPectoralFlipper: { min: 0.05, max: 3.0 }
  Fluke: { min: 0.05, max: 3.0 }
  VentralGrooves: { min: 0.1, max: 2.0 }
  DorsalFin: { min: 0.2, max: 1.5 }
  Rostrum: { min: 0.2, max: 1.5 }

# -----------------------------------------------------------------------------
# Locomotion parameters for swimming (moving) mode
# -----------------------------------------------------------------------------
# Metabolic multiplier derived from Williams (1999) cost-of-transport equation:
#   COT_total = 7.79 * M^(-0.29) J/kg/m (Phil. Trans. R. Soc. B 354:193-201)
#   At ~70,000 kg and 2.3 m/s: total MR ≈ 3.2x Kleiber BMR
# Swimming speed: Gough et al. (2019, J. Exp. Biol. 222:jeb204172) tag-derived:
#   median 2.27±0.72 m/s, optimal 1.92±0.03 m/s for fin whales
#   Bose & Lien (1989) report 2.8-4.2 m/s sprint, but sustained cruising is lower
#   2.3 m/s chosen to match Gough et al. median cruising speed
locomotion:
  metabolic_multiplier: 3.2       # Williams (1999) COT at 70 t, 2.3 m/s -> ~3.2x Kleiber BMR
  convection_multiplier: 2.0      # h ~ v^0.8 scaling (Incropera et al. 2011): (2.3/1.0)^0.8 ≈ 1.95, rounded to 2.0
  swimming_speed_m_s: 2.3


# Counter-current heat-exchange (CCHE) control -- D2 / audit A2,A3.
# Thermoregulation = appendage effectiveness epsilon in [0,1] (cold->conserve,
# warm->dump), applied to the dilated appendage AVA perfusion. This REPLACES the
# perfusion_capacity magnitude control below (now DEPRECATED/unused) and any
# h-modulation (h is flow/geometry only). See docs/cche_effectiveness.md.
appendage_perfusion_max: 0.5      # omega_app, dilated AVA capacity [kg/m3/s]; SENSITIVITY var (sweep 0.3-0.8)
cche_effectiveness:               # epsilon range per window: min=dump (AVAs open), max=conserve (retia)
  LeftPectoralFlipper:  { min: 0.15, max: 0.90 }
  RightPectoralFlipper: { min: 0.15, max: 0.90 }
  Fluke:                { min: 0.15, max: 0.90 }
  Rostrum:              { min: 0.20, max: 0.70 }
  DorsalFin:            { min: 0.15, max: 0.70 }
  VentralGrooves:       { min: 0.15, max: 0.70 }

# -----------------------------------------------------------------------------
# Default simulation cases
# -----------------------------------------------------------------------------
# Fin whales encounter -2C to 28C+ across migration (polar feeding to tropical breeding)
default_cases:
  - { water_temp_C: -2.0, mode: active }
  - { water_temp_C: 0.0,  mode: active }
  - { water_temp_C: 5.0,  mode: active }
  - { water_temp_C: 10.0, mode: active }
  - { water_temp_C: 15.0, mode: active }
  - { water_temp_C: 20.0, mode: active }
  - { water_temp_C: 25.0, mode: active }
  - { water_temp_C: 28.0, mode: active }
  - { water_temp_C: 30.0, mode: active }
