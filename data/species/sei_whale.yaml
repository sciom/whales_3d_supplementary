# Sei Whale (Balaenoptera borealis) - Species Configuration
# =========================================================
# Parameters based on peer-reviewed literature. See docs/sei_whale_references.md
# for full citations and verification. Sei whales are the most pelagic/temperate
# rorqual ("greyhound of the sea"): slender build, relatively thin blubber, and a
# warmer thermal habitat than fin/blue whales.

species: sei_whale
common_name: Sei Whale
scientific_name: Balaenoptera borealis

# Morphometrics
body_mass_kg: 20000             # Adult ~15 m, ~20 t (Lockyer 1976 length-mass; slender rorqual)

# -----------------------------------------------------------------------------
# Physiology
# -----------------------------------------------------------------------------
# Core temperature: Brodie & Paasche (1985) made stratified post-mortem
# measurements on BOTH fin and sei whales (fin measured 36.1 C). Sei is a large
# rorqual measured in the same study; 36.1 C is adopted (no separate published
# sei deep-body value). General baleen whale range 36.6-37.2 C (Kanwisher &
# Sundnes 1966).
core_temperature_C: 36.1        # Adopted from Brodie & Paasche 1985 (fin, same study); no separate sei datum
core_temperature_min_C: 28.0    # Lethal-hypothermia GUARD (comparative mammalian cardiac limit ~28 C; no measured cetacean value). See docs/lethal_hypothermia_threshold.md
core_temperature_max_C: 40.0    # Lethal-hyperthermia GUARD (mammalian lethal ~42 C); not a normal-range bound.

# Sei whales occupy temperate and subtropical offshore waters, feeding in cooler
# subpolar-temperate zones but avoiding polar ice; warmer TNZ anchor than fin/blue.
thermoneutral_water_C: 10.0

# -----------------------------------------------------------------------------
# Scaling factors
# -----------------------------------------------------------------------------
# Large rorqual FMRs are less than half predicted from smaller mammals
# (Blawas et al. 2025, Science Advances). See docs/metabolic_derivation.md.
metabolic_scale: 0.004          # DEPRECATED (A4/D3): no longer drives Q_m (now FMR-forward from fmr_watts); kept for diagnostic. See docs/metabolic_derivation.md
fmr_watts: 2866                 # ~50% Kleiber BMR (3.4*M^0.75) at 20 t = 0.5*5732 W (Blawas et al. 2025 large-rorqual scaling)
fmr_source: "Blawas et al. 2025 Science Advances; ~50% of Kleiber at 20 t"
perfusion_scale: 0.012          # BLUBBER-side CCHE reduction only (D1/A12); core keeps full arterial omega_b=0.8. Baseline under A2 review.
transition_fraction: 0.15
region_blend_iterations: 150
region_blend_alpha: 0.5

# -----------------------------------------------------------------------------
# Transient solver defaults
# -----------------------------------------------------------------------------
# Thermal material properties are in data/sei_whale/materials.json
# Blubber k=0.22 W/m-K (Parry 1949 on rorqual blubber; sei is a rorqual like fin/blue)
dt_seconds: 300
total_hours: 96
min_hours: 48
steady_eps: 1.0e-5

# -----------------------------------------------------------------------------
# Mesh paths (relative to project root)
# -----------------------------------------------------------------------------
mesh:
  surface_obj: assets/meshes/sei_whale_surface.obj
  volume_mesh: assets/meshes/sei_whale_variable_blubber.vtu
  volume_raw: assets/meshes/sei_whale_volume_full_gmsh.vtk
  element_size: 0.07            # UNIFORM physical element size across all species (run with --uniform-edge);
                               # surface resampled to ~0.07 m edges so node/tet count scales with body volume -> comparable meshes.

# -----------------------------------------------------------------------------
# Data paths (relative to project root)
# -----------------------------------------------------------------------------
data:
  vertex_groups: data/sei_whale/vertex_groups.json
  surface_mesh: data/sei_whale/surface_mesh.json
  surface_regions: data/sei_whale/surface_regions.json
  tissue_info: data/sei_whale/tissue_info_variable.json

# -----------------------------------------------------------------------------
# Regional blubber thickness (meters)
# -----------------------------------------------------------------------------
# Sei whales are slender with relatively THIN blubber for a rorqual (thinner than
# fin/blue). Body ~6 cm adopted as an adult mid-body estimate (ESTIMATE: no sei-
# specific ultrasound survey in the project corpus; bracketed by the thin end of
# rorqual blubber ranges). Regional ratios follow the fin whale template.
blubber_thickness:
  Body: 0.0600            # 6 cm - adult mid-body ESTIMATE (thin-blubbered slender rorqual)
  Peduncle: 0.0467        # scaled from Body (ratio 0.778, fin template)
  Rostrum: 0.0267         # scaled from Body (ratio 0.444)
  LeftPectoralFlipper: 0.0133   # scaled from Body (ratio 0.222)
  RightPectoralFlipper: 0.0133  # scaled from Body (ratio 0.222)
  Fluke: 0.0167           # scaled from Body (ratio 0.278)
  DorsalFin: 0.0120       # scaled from Body (ratio 0.200)
  VentralGrooves: 0.0133  # scaled from Body (ratio 0.222)

# -----------------------------------------------------------------------------
# Baseline convection coefficients (W/m^2-K)
# -----------------------------------------------------------------------------
# Appendages function as thermal windows (Scholander & Schevill 1955). Rorqual
# pattern shared with fin/blue whales.
# Effective surface conductance (#19/A5): physical water-side values; insulation
# in blubber + rete/shell counter-current terms, not a fake low h.
convection_base:
  Body: 35.0
  Peduncle: 40.0
  Rostrum: 50.0
  DorsalFin: 55.0
  VentralGrooves: 45.0
  Fluke: 60.0
  LeftPectoralFlipper: 60.0
  RightPectoralFlipper: 60.0

# -----------------------------------------------------------------------------
# Thermoregulatory regions
# -----------------------------------------------------------------------------
thermoregulatory_regions:
  - Body
  - LeftPectoralFlipper
  - RightPectoralFlipper
  - Fluke
  - DorsalFin
  - VentralGrooves
  - Rostrum

# -----------------------------------------------------------------------------
# Thermoregulation capacity
# -----------------------------------------------------------------------------
# ~10-fold modulation via vascular control (Kvadsheim & Folkow 1997)
convection_capacity:
  LeftPectoralFlipper: { min: 0.3, max: 3.0 }
  RightPectoralFlipper: { min: 0.3, max: 3.0 }
  Fluke: { min: 0.3, max: 3.0 }
  VentralGrooves: { min: 0.5, max: 2.0 }
  DorsalFin: { min: 0.7, max: 1.5 }
  Rostrum: { min: 0.7, max: 1.5 }

# -----------------------------------------------------------------------------
# Perfusion modulation capacity
# -----------------------------------------------------------------------------
perfusion_capacity:
  Body: { min: 0.7, max: 1.3 }
  LeftPectoralFlipper: { min: 0.05, max: 3.0 }
  RightPectoralFlipper: { min: 0.05, max: 3.0 }
  Fluke: { min: 0.05, max: 3.0 }
  VentralGrooves: { min: 0.1, max: 2.0 }
  DorsalFin: { min: 0.2, max: 1.5 }
  Rostrum: { min: 0.2, max: 1.5 }

# -----------------------------------------------------------------------------
# Locomotion parameters for swimming (moving) mode
# -----------------------------------------------------------------------------
# Sei whales are among the fastest baleen whales (sprint to ~13 m/s). A
# conservative sustained cruising speed of 2.5 m/s is used for energetics.
# Metabolic multiplier from Williams (1999) COT = 7.79*M^(-0.29) J/kg/m:
#   at 20,000 kg and 2.5 m/s, locomotor cost ~3.8x Kleiber BMR.
locomotion:
  metabolic_multiplier: 3.8       # Williams (1999) COT at 20 t, 2.5 m/s
  convection_multiplier: 2.0      # h ~ v^0.8 (Incropera 2011): (2.5/1.0)^0.8 ~= 2.08
  swimming_speed_m_s: 2.5


# Counter-current heat-exchange (CCHE) control -- D2 / audit A2,A3.
# Thermoregulation = appendage effectiveness epsilon in [0,1] (cold->conserve,
# warm->dump), applied to the dilated appendage AVA perfusion. This REPLACES the
# perfusion_capacity magnitude control below (now DEPRECATED/unused) and any
# h-modulation (h is flow/geometry only). See docs/cche_effectiveness.md.
appendage_perfusion_max: 0.5      # omega_app, dilated AVA capacity [kg/m3/s]; SENSITIVITY var (sweep 0.3-0.8)
cche_effectiveness:               # epsilon range per window: min=dump (AVAs open), max=conserve (retia)
  LeftPectoralFlipper:  { min: 0.15, max: 0.90 }
  RightPectoralFlipper: { min: 0.15, max: 0.90 }
  Fluke:                { min: 0.15, max: 0.90 }
  Rostrum:              { min: 0.20, max: 0.70 }
  DorsalFin:            { min: 0.15, max: 0.70 }
  VentralGrooves:       { min: 0.15, max: 0.70 }

# -----------------------------------------------------------------------------
# Default simulation cases
# -----------------------------------------------------------------------------
default_cases:
  - { water_temp_C: -2.0, mode: active }
  - { water_temp_C: 0.0,  mode: active }
  - { water_temp_C: 5.0,  mode: active }
  - { water_temp_C: 10.0, mode: active }
  - { water_temp_C: 15.0, mode: active }
  - { water_temp_C: 20.0, mode: active }
  - { water_temp_C: 25.0, mode: active }
  - { water_temp_C: 28.0, mode: active }
  - { water_temp_C: 30.0, mode: active }
