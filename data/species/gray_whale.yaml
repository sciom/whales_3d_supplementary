# Gray Whale (Eschrichtius robustus) - Species Configuration
# ==========================================================
# Parameters based on peer-reviewed literature. See docs/gray_whale_references.md
# for full citations and verification. Gray whales are NOT rorquals (family
# Eschrichtiidae): no dorsal fin (a dorsal hump + "knuckles" instead) and only
# 2-5 short throat creases (not rorqual ventral grooves). Benthic suction
# feeders, cold-adapted, with the longest migration of any mammal.

species: gray_whale
common_name: Gray Whale
scientific_name: Eschrichtius robustus

# Morphometrics
body_mass_kg: 25000            # Adult ~13-15 m; adult range ~15-35 t, mean ~25 t (NOAA; COSEWIC)

# -----------------------------------------------------------------------------
# Physiology
# -----------------------------------------------------------------------------
# No direct gray whale deep-body measurement exists in the project corpus.
# Core temperature assumed from the general mysticete range (Kanwisher & Sundnes
# 1966: 36.6-37.2 C) anchored to the lower measured values (humpback 36.0 C,
# Morrison 1962) since gray whales are cold-adapted.
core_temperature_C: 36.0        # ASSUMED (no direct measurement); general mysticete, cold-adapted
core_temperature_min_C: 28.0    # Lethal-hypothermia GUARD (comparative mammalian cardiac limit ~28 C; no measured cetacean value). See docs/lethal_hypothermia_threshold.md
core_temperature_max_C: 40.0    # Lethal-hyperthermia GUARD (mammalian lethal ~42 C); not a normal-range bound.

# Gray whales feed in cold subarctic/Arctic waters (Bering/Chukchi, ~4-8 C) and
# migrate to warm Baja California breeding lagoons (~15-20 C). Feeding-ground
# anchor used, where the animal spends most of the year and cold stress is
# greatest.
thermoneutral_water_C: 8.0

# -----------------------------------------------------------------------------
# Scaling factors
# -----------------------------------------------------------------------------
# metabolic_scale kept consistent with the other species (a known open issue;
# see docs/metabolic_derivation.md). NOTE: the Blawas et al. (2025) ~50%-Kleiber
# scaling was derived for lunge-feeding rorquals; gray whales are benthic suction
# feeders, so fmr_watts here is an approximation (full Kleiber ~6767 W is an
# upper bound at 25 t).
metabolic_scale: 0.004          # DEPRECATED (A4/D3): no longer drives Q_m (now FMR-forward from fmr_watts); kept for diagnostic. See docs/metabolic_derivation.md
fmr_watts: 3383                 # ~50% Kleiber BMR (3.4*M^0.75) at 25 t = 0.5*6767 W (approximation; see note)
fmr_source: "0.5 x Kleiber BMR at 25 t (approximation; gray whale not a lunge feeder, no direct FMR)"
perfusion_scale: 0.012          # BLUBBER-side CCHE reduction only (D1/A12); core keeps full arterial omega_b=0.8. Baseline under A2 review.
transition_fraction: 0.15
region_blend_iterations: 150
region_blend_alpha: 0.5

# -----------------------------------------------------------------------------
# Transient solver defaults
# -----------------------------------------------------------------------------
# Thermal material properties are in data/gray_whale/materials.json
# Blubber k=0.20 W/m-K (thick cold-adapted blubber; assumed as for right whale;
# no gray-whale-specific conductivity measurement)
dt_seconds: 300
total_hours: 120
min_hours: 48
steady_eps: 1.0e-5

# -----------------------------------------------------------------------------
# Mesh paths (relative to project root)
# -----------------------------------------------------------------------------
mesh:
  surface_obj: assets/meshes/gray_whale_surface.obj
  volume_mesh: assets/meshes/gray_whale_variable_blubber.vtu
  volume_raw: assets/meshes/gray_whale_volume_full_gmsh.vtk
  element_size: 0.07            # UNIFORM physical element size across all species (run with --uniform-edge);
                               # surface resampled to ~0.07 m edges so node/tet count scales with body volume -> comparable meshes.

# -----------------------------------------------------------------------------
# Data paths (relative to project root)
# -----------------------------------------------------------------------------
data:
  vertex_groups: data/gray_whale/vertex_groups.json
  surface_mesh: data/gray_whale/surface_mesh.json
  surface_regions: data/gray_whale/surface_regions.json
  tissue_info: data/gray_whale/tissue_info_variable.json

# -----------------------------------------------------------------------------
# Regional blubber thickness (meters)
# -----------------------------------------------------------------------------
# Gray whales are cold-adapted with THICK blubber (~10-25 cm; up to 25-30 cm in
# pre-migration fat individuals). Body 15 cm adopted as an adult mid-body
# estimate. Regional ratios follow the right whale (non-rorqual) template.
blubber_thickness:
  Body: 0.1500                  # 15 cm - adult mid-body estimate (cold-adapted; range 10-25 cm)
  Peduncle: 0.1050              # scaled from Body (ratio 0.70, right whale template)
  Rostrum: 0.0450               # scaled from Body (ratio 0.30)
  LeftPectoralFlipper: 0.0225   # scaled from Body (ratio 0.15)
  RightPectoralFlipper: 0.0225  # scaled from Body (ratio 0.15)
  Fluke: 0.0263                 # scaled from Body (ratio 0.175)
  # Gray whales lack a dorsal fin and rorqual ventral grooves

# -----------------------------------------------------------------------------
# Baseline convection coefficients (W/m^2-K)
# -----------------------------------------------------------------------------
# No dorsal fin; thermal windows are the flippers and fluke (like right/bowhead).
# Effective surface conductance (#19/A5): physical water-side values; insulation
# in blubber + rete/shell counter-current terms, not a fake low h.
convection_base:
  Body: 35.0
  Peduncle: 40.0
  Rostrum: 50.0
  Fluke: 60.0
  LeftPectoralFlipper: 60.0
  RightPectoralFlipper: 60.0

# -----------------------------------------------------------------------------
# Thermoregulatory regions
# -----------------------------------------------------------------------------
thermoregulatory_regions:
  - Body
  - LeftPectoralFlipper
  - RightPectoralFlipper
  - Fluke
  - Rostrum

# -----------------------------------------------------------------------------
# Thermoregulation capacity
# -----------------------------------------------------------------------------
convection_capacity:
  LeftPectoralFlipper: { min: 0.4, max: 2.5 }
  RightPectoralFlipper: { min: 0.4, max: 2.5 }
  Fluke: { min: 0.4, max: 2.5 }
  Rostrum: { min: 0.8, max: 1.3 }

# -----------------------------------------------------------------------------
# Perfusion modulation capacity
# -----------------------------------------------------------------------------
perfusion_capacity:
  Body: { min: 0.7, max: 1.3 }
  LeftPectoralFlipper: { min: 0.05, max: 3.0 }
  RightPectoralFlipper: { min: 0.05, max: 3.0 }
  Fluke: { min: 0.05, max: 3.0 }
  Rostrum: { min: 0.2, max: 1.5 }

# -----------------------------------------------------------------------------
# Locomotion parameters for swimming (moving) mode
# -----------------------------------------------------------------------------
# Gray whales are slow-to-moderate migratory swimmers. Sustained migration speed
# ~2 m/s (Mate et al. satellite telemetry; range ~1.5-2.2 m/s).
# Metabolic multiplier from Williams (1999) COT = 7.79*M^(-0.29) J/kg/m:
#   at 25,000 kg and 2.0 m/s, locomotor cost ~3.0x Kleiber BMR.
locomotion:
  metabolic_multiplier: 3.0       # Williams (1999) COT at 25 t, 2.0 m/s
  convection_multiplier: 1.7      # h ~ v^0.8 (Incropera 2011): (2.0/1.0)^0.8 ~= 1.74
  swimming_speed_m_s: 2.0


# Counter-current heat-exchange (CCHE) control -- D2 / audit A2,A3.
# Thermoregulation = appendage effectiveness epsilon in [0,1] (cold->conserve,
# warm->dump), applied to the dilated appendage AVA perfusion. This REPLACES the
# perfusion_capacity magnitude control below (now DEPRECATED/unused) and any
# h-modulation (h is flow/geometry only). See docs/cche_effectiveness.md.
appendage_perfusion_max: 0.5      # omega_app, dilated AVA capacity [kg/m3/s]; SENSITIVITY var (sweep 0.3-0.8)
cche_effectiveness:               # epsilon range per window: min=dump (AVAs open), max=conserve (retia)
  LeftPectoralFlipper:  { min: 0.15, max: 0.90 }
  RightPectoralFlipper: { min: 0.15, max: 0.90 }
  Fluke:                { min: 0.15, max: 0.90 }
  Rostrum:              { min: 0.20, max: 0.70 }

# -----------------------------------------------------------------------------
# Default simulation cases
# -----------------------------------------------------------------------------
default_cases:
  - { water_temp_C: -2.0, mode: active }
  - { water_temp_C: 0.0,  mode: active }
  - { water_temp_C: 5.0,  mode: active }
  - { water_temp_C: 10.0, mode: active }
  - { water_temp_C: 15.0, mode: active }
  - { water_temp_C: 20.0, mode: active }
  - { water_temp_C: 25.0, mode: active }
  - { water_temp_C: 28.0, mode: active }
  - { water_temp_C: 30.0, mode: active }
