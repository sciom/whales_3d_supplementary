# North Atlantic Right Whale (Eubalaena glacialis) - Species Configuration
# ========================================================================
# Adapted from humpback parameters with right whale-specific values.
# Sources: Kvadsheim et al. 1997, Parry 1949, Worthy & Edwards 1990

species: right_whale
common_name: North Atlantic Right Whale
scientific_name: Eubalaena glacialis

# Morphometrics
body_mass_kg: 60000             # Adult mass ~60 t (Kenney 2009; Fortune et al. 2012, Mar. Ecol. Prog. Ser.)

# Physiology
# Core temperature bounds anchored to baleen whale data and right whale biology
# (see docs/right_whale_references.md).
core_temperature_C: 36.0        # Mysticete measured range (no direct right-whale datum); was 36.6
core_temperature_min_C: 28.0    # Lethal-hypothermia GUARD (comparative mammalian cardiac limit ~28 C; no measured cetacean value). See docs/lethal_hypothermia_threshold.md
core_temperature_max_C: 40.0    # Lethal-hyperthermia GUARD (mammalian lethal ~42 C); not a normal-range bound.
thermoneutral_water_C: 8.0      # Colder-adapted species

# Scaling factors (preliminary - needs calibration with right whale mesh)
# See docs/metabolic_derivation.md for allometric context
metabolic_scale: 0.005          # DEPRECATED (A4/D3): no longer drives Q_m (now FMR-forward from fmr_watts); kept for diagnostic. See docs/metabolic_derivation.md
fmr_watts: 6498                 # FMR estimate (Fortune et al. 2013, right whale bioenergetics at 60 t)
fmr_source: "Fortune et al. 2013 Mar. Ecol. Prog. Ser.; FMR at 60 t"
perfusion_scale: 0.012          # BLUBBER-side CCHE reduction only (D1/A12); core keeps full arterial omega_b=0.8. Baseline under A2 review.
transition_fraction: 0.15       # Fraction of blubber thickness used for smooth transition
region_blend_iterations: 150    # Laplacian smoothing iterations for inter-region blubber transitions
region_blend_alpha: 0.5         # Smoothing weight per iteration (0=no change, 1=full neighbor average)

# Transient solver defaults
dt_seconds: 300
total_hours: 120
min_hours: 48
steady_eps: 1.0e-5

# Mesh paths (relative to project root) - to be created
mesh:
  surface_obj: assets/meshes/right_whale_surface.obj
  volume_mesh: assets/meshes/right_whale_variable_blubber.vtu
  volume_raw: assets/meshes/right_whale_volume_full_gmsh.vtk
  element_size: 0.07            # UNIFORM physical element size across all species (run with --uniform-edge);
                               # surface resampled to ~0.07 m edges so node/tet count scales with body volume -> comparable meshes.

# Data paths (relative to project root)
data:
  vertex_groups: data/right_whale/vertex_groups.json
  surface_mesh: data/right_whale/surface_mesh.json
  surface_regions: data/right_whale/surface_regions.json
  tissue_info: data/right_whale/tissue_info_variable.json

# Blubber thickness in meters by region
# Moore et al. (2001) and Miller et al. (2011) A-mode/B-mode ultrasound surveys:
#   population mean = 12.23 ± 2.16 cm across all demographic cohorts.
#   22 cm is the pre-pregnant female maximum (extreme outlier); using
#   population mean per synthesis of Moore et al. 2001 and Miller et al. 2011.
# All other regions scaled proportionally (factor 12.23/22 = 0.5559).
blubber_thickness:
  Body: 0.1223                  # 12.23 cm - population mean (Moore et al. 2001; Miller et al. 2011)
  Peduncle: 0.0856              # scaled from Body (ratio 0.70)
  Rostrum: 0.0367               # scaled from Body (ratio 0.30)
  LeftPectoralFlipper: 0.0183   # scaled from Body (ratio 0.15)
  RightPectoralFlipper: 0.0183  # scaled from Body (ratio 0.15)
  Fluke: 0.0214                 # scaled from Body (ratio 0.175)
  # Right whales lack dorsal fin and ventral grooves

# Baseline convection coefficients (W/m^2-K)
# Right whales have no dorsal fin; less active thermoregulation
# Effective surface conductance (#19/A5): physical water-side values (skin 1-3 C
# above water; Cuyler 1992, Heath 1999). Insulation now lives in blubber + rete/
# shell counter-current terms, not a fake low h. (Was an air-like ramp.)
convection_base:
  Body: 35.0
  Peduncle: 40.0
  Rostrum: 50.0
  Fluke: 60.0
  LeftPectoralFlipper: 60.0
  RightPectoralFlipper: 60.0

# Thermoregulation capacity
convection_capacity:
  LeftPectoralFlipper: { min: 0.4, max: 2.5 }
  RightPectoralFlipper: { min: 0.4, max: 2.5 }
  Fluke: { min: 0.4, max: 2.5 }
  Rostrum: { min: 0.8, max: 1.3 }

# Thermoregulatory regions (vascular control / countercurrent exchange)
# See docs/right_whale_references.md for biological basis.
thermoregulatory_regions:
  - Body
  - LeftPectoralFlipper
  - RightPectoralFlipper
  - Fluke
  - Rostrum

# Perfusion modulation capacity (multiplier range for active vascular control)
# Modeled after baleen whale thermoregulation literature; no direct right whale
# measurements are available. See docs/right_whale_references.md.
perfusion_capacity:
  Body: { min: 0.7, max: 1.3 }
  LeftPectoralFlipper: { min: 0.05, max: 3.0 }
  RightPectoralFlipper: { min: 0.05, max: 3.0 }
  Fluke: { min: 0.05, max: 3.0 }
  Rostrum: { min: 0.2, max: 1.5 }

# Locomotion parameters for swimming (moving) mode
# Metabolic multiplier derived from Williams (1999) cost-of-transport equation:
#   COT_total = 7.79 * M^(-0.29) J/kg/m (Phil. Trans. R. Soc. B 354:193-201)
#   At ~60,000 kg and 1.5 m/s: total MR ≈ 2.2x Kleiber BMR; rounded to 2.5x
#   for active transit (higher than mean cruising)
# Swimming speed: ~1.5 m/s active transit (van der Hoop et al. 2019, Funct. Ecol. 33:1290)
#   Hain et al. (2013, PLOS ONE 8:e54340) report 1.0-1.6 m/s transit, 0.4 m/s routine
# Balaenid body plan produces higher drag than rorquals, lower cruising speed
locomotion:
  metabolic_multiplier: 2.5       # Williams (1999) COT at 60 t, 1.5 m/s -> ~2.2x; rounded to 2.5 for transit
  convection_multiplier: 1.4      # h ~ v^0.8 turbulent flat-plate (Incropera et al. 2011): (1.5/1.0)^0.8 = 1.38
  swimming_speed_m_s: 1.5


# Counter-current heat-exchange (CCHE) control -- D2 / audit A2,A3.
# Thermoregulation = appendage effectiveness epsilon in [0,1] (cold->conserve,
# warm->dump), applied to the dilated appendage AVA perfusion. This REPLACES the
# perfusion_capacity magnitude control below (now DEPRECATED/unused) and any
# h-modulation (h is flow/geometry only). See docs/cche_effectiveness.md.
appendage_perfusion_max: 0.5      # omega_app, dilated AVA capacity [kg/m3/s]; SENSITIVITY var (sweep 0.3-0.8)
cche_effectiveness:               # epsilon range per window: min=dump (AVAs open), max=conserve (retia)
  LeftPectoralFlipper:  { min: 0.15, max: 0.90 }
  RightPectoralFlipper: { min: 0.15, max: 0.90 }
  Fluke:                { min: 0.15, max: 0.90 }
  Rostrum:              { min: 0.20, max: 0.70 }

# Default simulation cases
default_cases:
  - { water_temp_C: -2.0, mode: active }
  - { water_temp_C: 0.0,  mode: active }
  - { water_temp_C: 5.0,  mode: active }
  - { water_temp_C: 10.0, mode: active }
  - { water_temp_C: 15.0, mode: active }
  - { water_temp_C: 20.0, mode: active }
  - { water_temp_C: 25.0, mode: active }
  - { water_temp_C: 28.0, mode: active }
  - { water_temp_C: 30.0, mode: active }
